- name: Backup files on the server
  hosts: linux_servers
  become: yes
  tasks:
    - name: Create backup directory
      file:
        path: /backup
        state: directory
        mode: "0755"

    - name: Archive files to backup directory
      archive:
        path: /var/log/*
        dest: /backup/logs-{{ ansible_date_time.iso8601 }}.tar
